<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - AI Codebase Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css" />
  <style>
    body { display: flex; align-items: center; justify-content: center; height: 100vh; background: #030305; margin: 0; }
  </style>
</head>
<body>
  <div class="mesh-bg"></div>
  <div class="login-card" style="position: relative; z-index: 10;">
    <div class="logo login-logo">
      <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="url(#logoGradient)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="logo-icon">
        <defs>
          <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#7c6ef5" />
            <stop offset="100%" stop-color="#5eead4" />
          </linearGradient>
        </defs>
        <rect x="3" y="11" width="18" height="10" rx="2"></rect>
        <circle cx="12" cy="5" r="2"></circle>
        <path d="M12 7v4"></path>
        <line x1="8" y1="16" x2="8" y2="16"></line><line x1="16" y1="16" x2="16" y2="16"></line>
      </svg>
      <span class="logo-text">CodeBrain</span>
    </div>
    <h2>Welcome Back</h2>
    <p>Enter your master password to continue</p>
    <input type="password" id="loginPassword" class="login-input" placeholder="Password" onkeydown="if(event.key==='Enter')handleLogin()" />
    <button id="loginBtn" class="btn btn-primary" onclick="handleLogin()">Login</button>
    <div id="loginError" class="login-error hidden"></div>
  </div>

  <script>
    async function handleLogin() {
      const pwd = document.getElementById('loginPassword').value;
      const btn = document.getElementById('loginBtn');
      const errorEl = document.getElementById('loginError');
      if (!pwd) return;
      
      btn.disabled = true;
      btn.textContent = "Logging in...";
      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: pwd })
        });
        if (res.ok) {
          window.location.href = '/';
        } else {
          const data = await res.json();
          errorEl.textContent = data.error || "Invalid password";
          errorEl.classList.remove('hidden');
        }
      } catch (err) {
        errorEl.textContent = "Connection error";
        errorEl.classList.remove('hidden');
      } finally {
        btn.disabled = false;
        btn.textContent = "Login";
      }
    }
  </script>
</body>
</html>
